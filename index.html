<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Progress Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toggleBtn" onclick="toggleSidebar()">☰</div>

<div id="sidebar">
  <h2>Saved Logs</h2>
  <ul id="savedLogsList"></ul>
</div>

<h1>📊Daily Progress Record</h1>

<div class="container">

  <!-- Calendar -->
  <div class="calendar">
    <input type="date" id="datePicker">
    <button onclick="loadData()">Load</button>
  </div>

  <!-- Work Log -->
  <div class="log">
    <h2>Today's Work</h2>
    
    <textarea id="workInput" placeholder="What did you do today?"></textarea>

    <h3>Git Links</h3>
    <input type="text" id="gitLink" placeholder="Paste GitHub link">
    <button onclick="addGit()">Add Link</button>

    <ul id="gitList"></ul>

    <button class="saveBtn" onclick="saveData()">Save</button>
  </div>

  <!-- Review Section -->
  <div class="review">
    <h2>Review / Feedback</h2>
    <textarea id="reviewInput" placeholder="Reviewer can write here..."></textarea>
    <button onclick="saveReview()">Save Review</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
